default:
  tags: ["docker"]  # runner для джобов

# ===== ПЕРЕМЕННЫЕ =====
variables:
  DOCKER_HOST: "unix:///var/run/docker.sock"
  DOCKER_DRIVER: "overlay2"
  DEPLOY_BRANCH: "main"                # из какой ветки деплоим
  APP_NAME: "${CI_PROJECT_PATH_SLUG}"  # имя контейнера
  APP_PORT: "80"                       # порт ВНУТРИ контейнера (nginx → 80)
  HOST_PORT: "2025"                    # порт НА ХОСТЕ раннера
  DOCKERFILE: "Dockerfile"             # путь до Dockerfile
  IMAGE_REPO: "${CI_PROJECT_PATH_SLUG}" # локальный тег репо на хосте раннера
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  IMAGE: "${IMAGE_REPO}:${IMAGE_TAG}"

stages: ["test", "build", "deploy"]

# ===== TEST =====
test:
  stage: test
  image: alpine:3.20
  script:
    # базовые проверки под статик-сайт (папка site)
    - "set -e"
    - "test -d site"
    - "test -s site/index.html"
    - "test -s site/style.css"
    - "test -s site/app.js"
    - "grep -qi '<title>' site/index.html"
    - "printf '✅ Базовые проверки пройдены\n'"

# ===== BUILD =====
build:
  stage: build
  image: docker:27
  needs: ["test"]
  script:
    - "docker version"
    # было echo '🧱 Собираем образ: '"$IMAGE"' (Dockerfile='"$DOCKERFILE"')  — падало на кавычках
    - "printf '🧱 Собираем образ: %s (Dockerfile=%s)\n' \"$IMAGE\" \"$DOCKERFILE\""
    - "docker build --pull -f \"$DOCKERFILE\" -t \"$IMAGE\" ."
    - "printf '📦 Топ образов:\n'"
    - "docker images --format '{{.Repository}}:{{.Tag}}\t{{.ID}}\t{{.Size}}' | sed -n '1,5p'"

# ===== DEPLOY =====
deploy:
  stage: deploy
  image: docker:27
  needs: ["build"]
  resource_group: "${CI_PROJECT_PATH_SLUG}"   # чтобы деплои не параллелились
  rules:
    - if: '$CI_COMMIT_BRANCH == $DEPLOY_BRANCH'
  script:
    - "printf '🧹 Останавливаем и удаляем старый контейнер (если есть)\n'"
    - "docker rm -f \"$APP_NAME\" 2>/dev/null || true"  # Грохаем старый контейнер
    - "printf '🧯 Проверяем, не занят ли порт %s другим контейнером\n' \"$HOST_PORT\""
    - "CID_BY_PORT=$(docker ps -q -f publish=${HOST_PORT}) ; [ -n \"$CID_BY_PORT\" ] && docker rm -f \"$CID_BY_PORT\" || true"

    - "printf '🚀 Запуск нового контейнера → %s на хосте:%s → приложение:%s\n' \"$APP_NAME\" \"$HOST_PORT\" \"$APP_PORT\""
    - "docker run -d --name \"$APP_NAME\" -p \"${HOST_PORT}:${APP_PORT}\" --restart unless-stopped \"$IMAGE\""
    - "printf '🔎 Список контейнеров:\n'"
    - "docker ps --filter name=${APP_NAME}"

    # проверка доступности С ХОСТА (curl в сети хоста)
    - "printf '🩺 Проверка доступности с хоста: http://127.0.0.1:%s\n' \"$HOST_PORT\""
    - "docker run --rm --network host curlimages/curl -sSfI http://127.0.0.1:${HOST_PORT} | head -n 1"

    - "printf '🔌 Проброшенные порты контейнера:\n'"
    - "docker port \"$APP_NAME\" ${APP_PORT}/tcp || true"
  environment:
    name: production
    url: "http://${RUNNER_HOST:-127.0.0.1}:${HOST_PORT}"
